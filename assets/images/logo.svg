<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" role="img" aria-label="Bonati Fight Club">
  <defs>
    <linearGradient id="bfcRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E61B3A"/>
      <stop offset="100%" stop-color="#8E0C20"/>
    </linearGradient>
  </defs>
  <!-- Shield mark -->
  <g transform="translate(4,6)">
    <path d="M34 2 L66 12 L66 38 C66 56 50 66 34 72 C18 66 2 56 2 38 L2 12 Z"
          fill="url(#bfcRed)" stroke="#F5F0E8" stroke-width="1.5"/>
    <!-- Crossed gloves / fists simplified -->
    <g fill="#F5F0E8">
      <path d="M14 26 L28 18 L34 24 L20 32 Z" opacity="0.95"/>
      <path d="M54 26 L40 18 L34 24 L48 32 Z" opacity="0.95"/>
      <circle cx="20" cy="40" r="6"/>
      <circle cx="48" cy="40" r="6"/>
      <path d="M14 44 L24 44 L24 52 L14 52 Z"/>
      <path d="M44 44 L54 44 L54 52 L44 52 Z"/>
    </g>
    <!-- BFC monogram inside -->
    <text x="34" y="64" font-family="Impact, 'Bebas Neue', sans-serif" font-size="10" font-weight="700"
          letter-spacing="1.5" fill="#0A0A0A" text-anchor="middle">BFC</text>
  </g>
  <!-- Wordmark -->
  <g transform="translate(82,0)" fill="#F5F0E8" font-family="'Bebas Neue', Impact, sans-serif" letter-spacing="1.2">
    <text x="0" y="34" font-size="26" font-weight="400">BONATI</text>
    <text x="0" y="58" font-size="16" font-weight="400" fill="#C8102E" letter-spacing="3">FIGHT CLUB</text>
    <line x1="0" y1="64" x2="130" y2="64" stroke="#F5F0E8" stroke-width="0.5" opacity="0.35"/>
    <text x="0" y="74" font-size="7" letter-spacing="3" fill="#CFC8BD">GODOY CRUZ · MENDOZA</text>
  </g>
</svg>
